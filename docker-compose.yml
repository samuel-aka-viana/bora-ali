services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bora_ali}
      POSTGRES_USER: ${POSTGRES_USER:-bora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bora}
    volumes:
      - bora_ali_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bora} -d ${POSTGRES_DB:-bora_ali}"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    image: ghcr.io/versity/versitygw:v1.4.1
    restart: unless-stopped
    environment:
      ROOT_ACCESS_KEY: ${VERSITYGW_ACCESS_KEY:-versity}
      ROOT_SECRET_KEY: ${VERSITYGW_SECRET_KEY:-versity123}
      VGW_PORT: ":7070"
      VGW_BACKEND: posix
      VGW_BACKEND_ARGS: /data
      VGW_WEBUI_PORT: ":7071"
      VGW_WEBUI_NO_TLS: "true"
      VGW_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - bora_ali_storage:/data
    ports:
      - "8081:7070"  # S3 API (browser access para media)
      - "8082:7071"  # WebGUI
    depends_on:
      init-storage:
        condition: service_completed_successfully

  init-storage:
    image: alpine:3.19
    volumes:
      - bora_ali_storage:/data
    command: mkdir -p /data/${AWS_STORAGE_BUCKET_NAME:-bora-ali}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.8"
          memory: 3372M
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      AWS_S3_ENDPOINT_URL: http://storage:7070
      AWS_ACCESS_KEY_ID: ${VERSITYGW_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${VERSITYGW_SECRET_KEY:-minioadmin}
      OTEL_SERVICE_NAME: bora-ali
      REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
        VITE_GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  bora_ali_pgdata:
    external: true
    name: backend_bora_ali_pgdata
  bora_ali_storage:
    external: true
    name: backend_bora_ali_storage
